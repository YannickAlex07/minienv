name: Checks

on:
  pull_request:

env:
  GO_VERSION: 1.26

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Go
        uses: actions/setup-go@v2
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Golangci-lint
        uses: golangci/golangci-lint-action@v8.0.0
